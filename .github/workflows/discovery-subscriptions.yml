name: Discovery Subscriptions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve since cursor from subscription branch
        id: cursor
        run: |
          SINCE=""
          SEEDS_FILE=""
          if git ls-remote --exit-code --heads origin subscription >/dev/null 2>&1; then
            git fetch origin subscription
            if git show origin/subscription:subscriptions.state.json > /tmp/prev-state.json 2>/dev/null; then
              SINCE=$(jq -r '.next_since // empty' /tmp/prev-state.json)
            fi
            if git show origin/subscription:seeds.txt > /tmp/seeds.txt 2>/dev/null; then
              SEEDS_FILE=/tmp/seeds.txt
            fi
          fi
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "seeds_file=$SEEDS_FILE" >> "$GITHUB_OUTPUT"

      - name: Generate subscriptions.txt and nodes.txt
        env:
          GIST_DISCOVERY_TOKEN: ${{ secrets.GIST_DISCOVERY_TOKEN }}
        run: |
          go run ./cmd/subscription_discovery \
            -out /tmp/subscriptions.txt \
            -nodes-out /tmp/nodes.txt \
            -stats-out /tmp/subscriptions.stats.json \
            -state-out /tmp/subscriptions.state.json \
            -seeds-file "${{ steps.cursor.outputs.seeds_file }}" \
            -since "${{ steps.cursor.outputs.since }}" \
            -pages 20 \
            -per-page 100 \
            -min-nodes 3 \
            -max-file-bytes 2097152 \
            -max-candidates 1200 \
            -overlap 10m \
            -allow-empty

      - name: Switch to subscription branch
        run: |
          if git ls-remote --exit-code --heads origin subscription >/dev/null 2>&1; then
            git fetch origin subscription
            git switch -C subscription origin/subscription
          else
            git switch -c subscription
          fi

      - name: Update generated files
        run: |
          cp /tmp/subscriptions.txt subscriptions.txt
          cp /tmp/nodes.txt nodes.txt
          cp /tmp/subscriptions.stats.json subscriptions.stats.json
          cp /tmp/subscriptions.state.json subscriptions.state.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f subscriptions.txt nodes.txt subscriptions.stats.json subscriptions.state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(subscription): update subscriptions artifacts"
          git push origin HEAD:subscription
